<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catering</title>

    <script type="importmap">
        {
            "imports": {
                "vue": "https://unpkg.com/vue@3.5.28/dist/vue.esm-browser.js"
            },
            "integrity": {
                "https://unpkg.com/vue@3.5.28/dist/vue.esm-browser.js": "sha384-Q3gg1uvxzo7j5a5zJyKw57OkLMyOhl1sGmQxxn63S3lsr8Ki3ACSKKSvK8zG//7D"
            }
        }
    </script>

    <link href="style.css" rel="stylesheet">
    <script src="app.js" type="module"></script>
</head>

<body>
    <div id="app">
        <header class="header">
            <img src="assets/logo.png" alt="Catering logotyp" class="logo">
            <form @submit.prevent="searchRecipes">
                <input type="text" placeholder="Sök..." class="search">
            </form>
            <img src="assets/filter.svg" alt="filterLogo" id="filter" class="filter">
            <img src="assets/cart.svg" alt="basket" id="cart" class="cart">
        </header>
        <section class="preferenceContainer">
            <div class="upperPreferences">
                <preference-button title="Förrätt" background="#34B6BF" @click="preferenceRecipe"></preference-button>
                <preference-button title="Huvudrätt" background="#D8AF0D" @click="preferenceRecipe"></preference-button>
                <preference-button title="Efterrätt" background="#2EA035" @click="preferenceRecipe"></preference-button>
                <preference-button title="Buffé" background="#2D61A6" @click="preferenceRecipe"></preference-button>
            </div>
            <div class="lowerPreferences">
                <preference-button title="Asiatiskt" background="#651E81" @click="preferenceRecipe"></preference-button>
                <preference-button title="Italienskt" background="#CA0000"
                    @click="preferenceRecipe"></preference-button>
                <preference-button title="Mexikanskt" background="#DB8F00"
                    @click="preferenceRecipe"></preference-button>
                <preference-button title="Svenskt" background="#E6D61F" @click="preferenceRecipe"></preference-button>
                <preference-button title="Anpassningsbar" background="#BC0485"
                    @click="preferenceRecipe"></preference-button>
            </div>
        </section>

        <section class="recipes">

            <recipe-container v-for="recipe in allRecipes" :key="recipe.id" buttonTitle="knapp" buttonBackground="red"
                :recipe="recipe"></recipe-container>

        </section>
    </div>
</body>

</html>
