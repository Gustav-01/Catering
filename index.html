<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catering</title>

    <script type="importMap">
        {
            "imports": {
                "vue": "https://unpkg.com/vue@3.5.28/dist/vue.esm-browser.js"
            },
            "integrity": {
                "https://unpkg.com/vue@3.5.28/dist/vue.esm-browser.js": "sha384-Q3gg1uvxzo7j5a5zJyKw57OkLMyOhl1sGmQxxn63S3lsr8Ki3ACSKKSvK8zG//7D"
            }
        }
    </script>

    <link href="style.css" rel="stylesheet">
    <script src="app.js" type="module"></script>
</head>

<body>
    <div id="app">
        <header class="header">
            <img src="assets/logo.png" alt="logo-image" class="logo">
            <input type="text" placeholder="Sök..." class="search">
            <img src="assets/filter.svg" alt="filterLogo" id="filter" class="filter">
            <img src="assets/cart.svg" alt="basket" id="cart" class="cart">
        </header>
        <section class="preferenceContainer">
            <div class="upperPreferences">
                <preference-button>Förrätt</preference-button>
                <preference-button>Huvudrätt</preference-button>
                <preference-button>Efterrätt</preference-button>
                <preference-button>Buffé</preference-button>
            </div>
            <div class="lowerPreferences">
                <preference-button>Asiatiskt</preference-button>
                <preference-button>Italienskt</preference-button>
                <preference-button>Mexikanskt</preference-button>
                <preference-button>Svenskt</preference-button>
                <preference-button>Anpassningsbar</preference-button>
            </div>
        </section>
    </div>
</body>

</html>
